# Default values for the Easyedit chart (single nginx static frontend).
replicaCount: 1

image:
  # Image built from this repo's `Dockerfile` (nginx serving static frontend).
  repository: ghcr.io/easyedit/easyedit-simple
  pullPolicy: IfNotPresent
  tag: ''

imagePullSecrets: []
nameOverride: ''

podAnnotations: {}
podLabels: {}

service:
  type: ClusterIP
  port: 80

# Container listen port (Easyedit nginx image listens on 8080).
containerPort: 8080

env: []

ingress:
  enabled: false
  className: ''
  annotations: {}
  hosts:
    - host: easyedit.local
      paths:
        - path: /
          pathType: ImplementationSpecific
  tls: []

# Gateway API (optional)
gateway:
  enabled: false
  name: '' # default: release name + "-gateway" suffix
  namespace: '' # to override the namespace
  annotations: {}
  gatewayClassName: '' # required when enabled=true
  listeners:
    - name: http
      protocol: HTTP
      port: 80
      allowedRoutes:
        namespaces:
          from: Same # Allow routes from the same namespace

httpRoute:
  enabled: false
  annotations: {}
  # parentRefs: # Omit entirely to use default (auto-references gateway in same namespace)
  #   - name: "" # default: gateway.name or {release-name}-gateway
  #     namespace: "" # to override the namespace
  #     sectionName: "http"
  hostnames:
    - easyedit.local
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 101
  runAsGroup: 101
  fsGroup: 101

securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop:
      - ALL

resources: {}

livenessProbe:
  httpGet:
    path: /
    port: http
readinessProbe:
  httpGet:
    path: /
    port: http
