apiVersion: v1
kind: Service
metadata:
  name: {{ include "easyedit.name" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "easyedit.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "easyedit.selectorLabels" . | nindent 4 }}
